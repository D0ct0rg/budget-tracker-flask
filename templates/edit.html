<!DOCTYPE html>
<html>

<head>
    <title>Edit Transaction</title>

    <head>Edit Transaction</head>

</head>

<body>
    <form method="POST" action="/update/{{ transaction[0] }}">
        <input type="text" name="name" placeholder="Name" value="{{ transaction[1] }}" required>
        <input type="number" step="0.01" name="amount" placeholder="Amount" value="{{ transaction[2] }}" required>
        <select name="category" required>
            <option value="Food">Food</option>
            <option value="Transportation">Transportation</option>
            <option value="Housing">Housing</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Education">Education</option>
            <option value="Job">Job</option>
            <option value="Other">Other</option>
        </select>
        <select name="transaction_type" required>
            <option value="Income">Income</option>
            <option value="Expense">Expense</option>
        </select>
        <input type="date" name="date" value="{{ transaction[5] }}" required>
        <button type="submit">Update</button>
    </form>
</body>

</html>
