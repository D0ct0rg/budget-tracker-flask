<!DOCTYPE html>
<html>

<head>
    <title>Edit Transaction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>Edit Transaction</h1>
        <p class="edit-subtitle">Update the details of this transaction.</p>
        <form method="POST" action="/update/{{ transaction[0] }}" class="edit-form">
            <label>Name</label>
            <input type="text" name="name" placeholder="Name" value="{{ transaction[1] }}" required>
            <label>Amount</label>
            <input type="number" step="0.01" name="amount" placeholder="Amount" value="{{ transaction[2] }}" required>
            <label>Category</label>
            <select name="category" required>
                <option value="Food" {% if transaction[3]=="Food" %}selected{% endif %}>Food</option>
                <option value="Transportation" {% if transaction[3]=="Transportation" %}selected{% endif %}>
                    Transportation
                </option>
                <option value="Housing" {% if transaction[3]=="Housing" %}selected{% endif %}>Housing</option>
                <option value="Entertainment" {% if transaction[3]=="Entertainment" %}selected{% endif %}>Entertainment
                </option>
                <option value="Utilities" {% if transaction[3]=="Utilities" %}selected{% endif %}>Utilities</option>
                <option value="Healthcare" {% if transaction[3]=="Healthcare" %}selected{% endif %}>Healthcare</option>
                <option value="Education" {% if transaction[3]=="Education" %}selected{% endif %}>Education</option>
                <option value="Job" {% if transaction[3]=="Job" %}selected{% endif %}>Job</option>
                <option value="Other" {% if transaction[3]=="Other" %}selected{% endif %}>Other</option>
            </select>
            <label>Type</label>
            <select name="transaction_type" required>
                <option value="Income" {% if transaction[4]=="Income" %}selected{% endif %}>Income</option>
                <option value="Expense" {% if transaction[4]=="Expense" %}selected{% endif %}>Expense</option>
            </select>
            <label>Date</label>
            <input type="date" name="date" value="{{ transaction[5] }}" required>
            <div class="edit-actions">
                <button type="submit">Update</button>
                <button type="button" onclick="window.location.href='/'">Cancel</button>
            </div>
        </form>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
